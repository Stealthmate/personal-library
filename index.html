<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <title>Val's Library</title>
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@5.x/css/materialdesignicons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Vuetify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@3.12.5/dist/vuetify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.12.5/dist/vuetify.min.js"></script>

    <!-- Load d3.js -->
    <script src="https://d3js.org/d3.v4.min.js"></script>

    <!-- Load the sankey.js function -->
    <script src="https://unpkg.com/d3-array@1"></script>
    <script src="https://unpkg.com/d3-collection@1"></script>
    <script src="https://unpkg.com/d3-path@1"></script>
    <script src="https://unpkg.com/d3-shape@1"></script>
    <script src="https://unpkg.com/d3-sankey@0"></script>

    <style>
        .v-chip.selectable {
            opacity: 0.5;
        }
        .v-chip.selectable.selected {
            opacity: 1.0;
        }

        .chip-language {
            color: #00AA55;
        }
        .link {
  fill: none;
  stroke: #000;
  stroke-opacity: .2;
}
.link:hover {
  stroke-opacity: .5;
}
    </style>
</head>

<body>
    <script type="text/x-template" id="app-template">
        <v-app>
            <v-app-bar>
                <v-app-bar-title>Val's Library</v-app-bar-title>
            </v-app-bar>
            <v-main>
                <v-container>
                    <section ref="sankey" class="d-flex flex-column align-center"></section>
                    <section>
                        <v-card flat>
                            <v-card-text class="d-flex flex-column">
                                <v-text-field v-model="query" variant="underlined" placeholder="Search..." />
                                <div>
                                    <span>Field</span>
                                    <v-chip-group v-model="selectedCat1" filter column>
                                        <v-chip v-for="v in cat1Values" class="selectable" :value="v" selected-class="selected">{{ v }}</v-chip>
                                    </v-chip-group>
                                </div>
                                <div>
                                    <span>Sub-field</span>
                                    <v-chip-group v-model="selectedCat2" filter column>
                                        <v-chip v-for="v in cat2Values" class="selectable" :value="v" selected-class="selected">{{ v }}</v-chip>
                                    </v-chip-group>
                                </div>
                                <v-chip-group v-model="selectedLanguages" filter multiple column>
                                    <v-chip v-for="language in theLanguages" class="selectable chip-language" :value="language" selected-class="selected">{{ language }}</v-chip>
                                </v-chip-group>
                                <v-chip-group v-model="selectedTags" filter multiple column>
                                    <v-chip v-for="tag in theTags" class="selectable" :value="tag" selected-class="selected">{{ tag }}</v-chip>
                                </v-chip-group>
                            </v-card-text>
                        </v-card>
                    </section>
                    <section v-for="resource in filteredResources" class="mt-5">
                        <v-card>
                            <v-card-item>
                                <v-card-title class="d-flex flex-column align-start">
                                    <span>{{ resource.title }}</span>
                                    <span class="text-subtitle-2">{{ resource.subtitle }}</span>
                                </v-card-title>
                                <v-card-subtitle>
                                    <span>{{ resource.authors.join(', ') }}</span>
                                </v-card-subtitle>
                            </v-card-item>
                            <v-card-text class="d-flex flex-column align-start">
                                <div class="font-italic">{{ resource.review }}</div>
                                <div class="d-flex flex-row justify-space-between align-center w-100">
                                    <div class="mt-3 text-body-small opacity-40">
                                        {{ resource.cat1 }}, {{ resource.cat2 }}
                                    </div>
                                    <div class="mt-3 ">
                                        <v-chip class="chip-language">{{ resource.language }}</v-chip>
                                        <v-chip v-for="tag in resource.tags">{{ tag }}</v-chip>
                                    </div>
                                </div>
                            </v-card-text>
                        </v-card>
                    </section>
                </v-container>
            </v-main>
        </v-app>
    </script>
    <script type="module">
        const { createApp, ref } = Vue;
        const { createVuetify } = Vuetify;
        import DATA from './data.json' with { type: "json" };
        import sankey from './sankey.js';

        createApp({
            template: '#app-template',
            data() {
                return {
                    resources: DATA.map(e => {
                        let r = {
                            ...e,
                            tags: (e.tags || []),
                            subtitle: (e.subtitle || ""),
                            authors: (e.authors || [])
                        };
                        return r;
                    }),
                    query: '',
                    selectedTags: [],
                    selectedLanguages: [],
                    selectedCat1: undefined,
                    selectedCat2: undefined
                };
            },
            mounted() {
                sankey.draw(this.$refs.sankey);
            },
            computed: {
                theTags() {
                    let tags = new Set();
                    this.resources.forEach(r => {
                        r.tags.forEach(t => tags.add(t));
                    });
                    return Array.from(tags);
                },
                cat1Values() {
                    return [...new Set(this.resources.map(book => book.cat1))];
                },
                cat2Values() {
                    return [...new Set(this.resources.filter(book => {
                        if(this.selectedCat1 !== undefined) {
                            return book.cat1 == this.selectedCat1;
                        }
                        return true;
                    }).map(book => book.cat2))];
                },
                theLanguages() {
                    return this.setOfValues('language');
                },
                filteredResources() {
                    return this.resources.filter(
                        book => {
                            if(this.selectedCat1 !== undefined) {
                                return book.cat1 == this.selectedCat1;
                            }
                            return true;
                        }
                    ).filter(
                        book => {
                            if(this.selectedCat2 !== undefined) {
                                return book.cat2 == this.selectedCat2;
                            }
                            return true;
                        }
                    ).filter(
                        r => {
                            if(this.selectedLanguages.length === 0) return true;
                            return this.selectedLanguages.includes(r.language);
                        }
                    ).filter(r => {
                        return this.selectedTags.every(t => r.tags.includes(t));
                    }).filter(r => {
                        if (this.query === "") return true;
                        let q = this.query.toLowerCase();
                        return [
                            r.title.toLowerCase().includes(q),
                            r.subtitle.toLowerCase().includes(q)
                        ].some(x => x);
                    });
                }
            },
            methods: {
                setOfValues(field) {
                    let values = new Set();
                    this.resources.forEach(r => {
                        if(r[field]) {
                            values.add(r[field])
                        }
                    });
                    return Array.from(values);
                }
            }
        }).use(createVuetify()).mount('#app');
    </script>
    <div id="app" />
</body>

</html>
